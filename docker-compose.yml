# ============================================================
# MeowOne Docker Compose
# ============================================================
#
# 快速启动（前后端一键运行）：
#   docker-compose up -d
#
# 启动成功后访问：
#   前端：http://localhost:9006
#   API 文档：http://localhost:9006/docs
#
# 查看日志：
#   docker-compose logs -f
#
# 停止：
#   docker-compose down
#
# 完全清除数据（慎用）：
#   docker-compose down -v
# ============================================================

services:
  backend:
    build:
      context: ./backend_v2
      dockerfile: Dockerfile
    container_name: meowone-backend
    # 不暴露后端端口，后端仅在 Docker 内部网络通信
    env_file:
      - .env
    environment:
      # Docker 内使用绝对路径挂载的数据库文件
      - DATABASE_PATH=/app/data/meowone.db
    volumes:
      # 挂载宿主机文件（兼容本地和 Docker 两种运行方式）
      - ./meowone.db:/app/data/meowone.db
      - ./.meowone:/app/.meowone
    networks:
      - meowone-net
    restart: unless-stopped

  frontend:
    build:
      context: ./admin_web
      dockerfile: Dockerfile
    container_name: meowone-frontend
    ports:
      - "9007:3000"
    environment:
      # 在 docker 网络内，通过服务名访问后端
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_started
    networks:
      - meowone-net
    restart: unless-stopped

networks:
  meowone-net:
    driver: bridge
