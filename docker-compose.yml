# ============================================================
# MeowOne Docker Compose
# ============================================================
#
# 快速启动（前后端一键运行）：
#   cp .env.docker .env     # 只需填 LLM_API_KEY 等关键配置
#   docker-compose up -d
#
# 启动成功后访问：
#   前端：http://localhost:9006
#   后端 API：http://localhost:8000
#   API 文档：http://localhost:8000/docs
#
# 查看日志：
#   docker-compose logs -f
#
# 停止：
#   docker-compose down
#
# 完全清除数据（慎用）：
#   docker-compose down -v
# ============================================================

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: meowone-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # 数据库持久化到宿主机（可选）
      - meowone-data:/app/data
    networks:
      - meowone-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./admin_web
      dockerfile: Dockerfile
    container_name: meowone-frontend
    ports:
      - "9006:3000"
    environment:
      # 在 docker 网络内，通过服务名访问后端
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - meowone-net
    restart: unless-stopped

networks:
  meowone-net:
    driver: bridge

volumes:
  meowone-data:
